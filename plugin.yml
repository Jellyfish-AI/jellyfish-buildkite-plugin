# plugin.yml
name: jellyfish-buildkite-plugin
description: Sends deployment status to Jellyfish DevOps API after a successful build.
requirements:
  - curl # Ensures curl is available on the agent
  - jq # Ensures jq is available for JSON processing

configuration:
  properties:
    webhook-url:
      type: string
      required: true
      description: The URL of your Jellyfish deployment webhook (e.g., https://webhooks.jellyfish.co/deployment).
    api-token:
      type: string
      required: true
      description: The Jellyfish API token for authentication, used in the X-jellyfish-api-token header.
    reference-id:
      type: string
      description: A unique identifier for this deployment. Defaults to the Buildkite build ID (BUILDKITE_BUILD_ID).
    name:
      type: string
      description: The name of the deployment. Defaults to the Buildkite pipeline slug (BUILDKITE_PIPELINE_SLUG).
    repo-name:
      type: string
      description: The name of the repository (e.g., 'ORG/REPO'). Defaults to the Buildkite repository URL (BUILDKITE_REPO).
    labels:
      type: array
      items:
        type: string
      description: A list of labels for the deployment (e.g., 'service:orders', 'region:us-east').
    source-url:
      type: string
      description: The URL to the source of the deployment (e.g., a CI build URL). Defaults to the Buildkite build URL (BUILDKITE_BUILD_URL).